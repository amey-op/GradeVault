<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CGPA & Course Grade Calculator</title>

    <!-- Tailwind CSS (via CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkBase: '#0a0a0a',
                        darkSurface: '#171717',
                        neonEmerald: '#10b981',
                        neonBlue: '#3b82f6',
                        neonRed: '#ef4444'
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://api.fontshare.com/v2/css?f[]=tanker@400&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0a0a0a;
            color: #f3f4f6;
            font-family: 'Outfit', system-ui, -apple-system, sans-serif;
            font-size: 1.05rem;
        }
        .glass-panel {
            background: rgba(23, 23, 23, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <!-- React Router DOM -->
    <script crossorigin src="https://unpkg.com/@remix-run/router@1.15.3/dist/router.umd.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-router@6.22.3/dist/umd/react-router.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-router-dom@6.22.3/dist/umd/react-router-dom.development.js"></script>

    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-darkBase text-gray-200 antialiased min-h-screen flex flex-col">
    <div id="root"></div>

    <!-- App Logic -->
    <script type="text/babel" src="app.js"></script>
</body>
</html>
